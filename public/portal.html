<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Pool Build — Infinity Pools</title>
<style>
  :root {
    --blue:#0a5ea8; --blue-dark:#0b4d87; --blue-deep:#093d6b;
    --past:#9aa7b2; --future:#a8c4da; --pale:#e8f3fb; --soft:#d7e8f5;
    --ink:#16324a; --mid:#4a6b85; --green:#1f8a4c; --amber:#b97d10;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Segoe UI",system-ui,Arial,sans-serif; background:linear-gradient(180deg,#eaf4fc 0%,#f6fafd 300px); color:var(--ink); }
  .wrap { max-width:1080px; margin:0 auto; padding:20px 16px 60px; }
  .cols { display:flex; gap:18px; align-items:flex-start; }
  .cols .col { flex:1; min-width:0; }
  @media (max-width:840px) { .cols { flex-direction:column; gap:0; } }
  .proj-switch { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; }
  .proj-switch .lbl { font-size:13px; color:var(--mid); font-weight:700; }
  .proj-switch .proj { border:1.5px solid var(--soft); background:#fff; color:var(--blue-dark); border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
  .proj-switch .proj:hover { border-color:var(--future); }
  .proj-switch .proj.cur { background:var(--blue); border-color:var(--blue); color:#fff; cursor:default; }
  header { background:linear-gradient(135deg,var(--blue-dark),var(--blue)); color:#fff; border-radius:16px; padding:26px 30px; box-shadow:0 8px 30px rgba(10,94,168,.25); }
  header .brand { font-weight:800; letter-spacing:3px; font-size:18px; }
  header .brand .inf { font-size:26px; vertical-align:-3px; margin-right:6px; }
  header h1 { margin:10px 0 2px; font-size:26px; }
  header .sub { opacity:.85; font-size:14px; }
  .card { background:#fff; border:1px solid var(--soft); border-radius:16px; box-shadow:0 2px 14px rgba(10,94,168,.07); padding:24px; margin-top:18px; }
  h2 { margin:0 0 14px; color:var(--blue-deep); font-size:19px; }
  .muted { color:var(--mid); font-size:13px; }

  /* tracker */
  .tracker { display:flex; align-items:flex-start; margin:8px 0 4px; }
  .step { flex:1; text-align:center; position:relative; }
  .step .dot { width:34px; height:34px; border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; background:#fff; border:3px solid var(--future); color:var(--future); position:relative; z-index:2; transition:all .3s; }
  .step .bar { position:absolute; top:16px; left:-50%; width:100%; height:4px; background:var(--future); z-index:1; }
  .step:first-child .bar { display:none; }
  .step .lbl { margin-top:8px; font-size:11.5px; font-weight:700; color:var(--future); line-height:1.25; padding:0 2px; }
  .step.past .dot { background:var(--past); border-color:var(--past); color:#fff; }
  .step.past .bar { background:var(--past); }
  .step.past .lbl { color:var(--past); font-weight:600; }
  .step.current .dot { background:var(--blue); border-color:var(--blue); color:#fff; transform:scale(1.25); box-shadow:0 0 0 6px rgba(10,94,168,.18); animation:pulse 2s infinite; }
  .step.current .bar { background:var(--past); }
  .step.current .lbl { color:var(--blue); font-weight:800; font-size:12.5px; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 6px rgba(10,94,168,.18);} 50%{ box-shadow:0 0 0 11px rgba(10,94,168,.08);} }

  .due-banner { display:flex; flex-wrap:wrap; gap:16px; align-items:center; justify-content:space-between; background:var(--pale); border:1px solid var(--soft); border-radius:12px; padding:16px 20px; margin-top:16px; }
  .due-banner .amt { font-size:26px; font-weight:800; color:var(--blue-dark); }
  .paybtn { background:var(--green); color:#fff; text-decoration:none; padding:13px 26px; border-radius:10px; font-weight:700; font-size:15px; }
  .paid { color:var(--green); font-weight:800; font-size:16px; }
  .todo { background:#fef4dc; border:1px solid #f3e3b5; border-radius:12px; padding:14px 18px; margin-top:14px; }
  .todo b { color:var(--amber); }
  .todo ul { margin:6px 0 0 18px; padding:0; }

  .phase-list { margin-top:6px; }
  .phase-item { display:flex; gap:14px; padding:13px 6px; border-bottom:1px solid #eef4fa; }
  .phase-item:last-child { border-bottom:none; }
  .phase-item .ico { font-size:20px; width:28px; text-align:center; flex-shrink:0; }
  .phase-item .nm { font-weight:700; }
  .phase-item.past { color:var(--past); }
  .phase-item.past .nm { color:var(--past); }
  .phase-item.current { background:var(--pale); border-radius:10px; }
  .phase-item.current .nm { color:var(--blue); font-size:15.5px; }
  .phase-item.future { color:var(--future); }
  .phase-item.future .nm { color:#7da3c4; }
  .phase-item .desc { font-size:13px; }

  .fin-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; }
  .fin { border:2px solid var(--soft); border-radius:12px; overflow:hidden; background:#fff; }
  .fin img,.fin .cb { width:100%; height:86px; object-fit:cover; display:block; }
  .fin .nm { padding:8px 10px; font-size:12.5px; font-weight:700; }
  .fin .nm small { display:block; color:var(--mid); font-weight:500; }

  /* renderings gallery + shared files */
  .rend-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }
  .rend { border:2px solid var(--soft); border-radius:12px; overflow:hidden; background:#fff; }
  .rend img { width:100%; height:160px; object-fit:cover; display:block; cursor:pointer; transition:transform .15s; }
  .rend img:hover { transform:scale(1.03); }
  details.files summary { cursor:pointer; font-weight:800; color:var(--blue-deep); font-size:17px; list-style:none; display:flex; align-items:center; gap:8px; }
  details.files summary::-webkit-details-marker { display:none; }
  details.files summary::before { content:'▸'; color:var(--blue); transition:transform .15s; }
  details.files[open] summary::before { transform:rotate(90deg); }
  .filelist { list-style:none; margin:14px 0 0; padding:0; }
  .filelist li { padding:11px 4px; border-bottom:1px solid #eef4fa; display:flex; align-items:center; gap:10px; }
  .filelist li:last-child { border-bottom:none; }
  .filelist a { color:var(--blue); text-decoration:none; font-weight:600; flex:1; }
  .filelist a:hover { text-decoration:underline; }
  .filelist .cat { color:var(--mid); font-size:12px; }

  /* change orders */
  .co { border:1px solid var(--soft); border-radius:12px; padding:14px 16px; margin-top:12px; }
  .co.pending { border-color:#f3e3b5; background:#fffaf0; }
  .co .top { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:baseline; }
  .co .desc { font-weight:600; flex:1; min-width:180px; }
  .co .amt { font-weight:800; color:var(--blue-dark); font-size:18px; white-space:nowrap; }
  .co .actions { margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; }
  .btn-approve { background:var(--green); color:#fff; border:none; padding:11px 22px; border-radius:10px; font-weight:700; cursor:pointer; font-size:14px; font-family:inherit; }
  .btn-approve:hover { filter:brightness(1.05); }
  .btn-decline { background:#fff; color:var(--mid); border:1.5px solid var(--soft); padding:11px 20px; border-radius:10px; font-weight:600; cursor:pointer; font-size:14px; font-family:inherit; }
  .co .status-ok { color:var(--green); font-weight:700; }

  /* finish picker */
  .brand-group { margin-top:14px; }
  .brand-group h3 { margin:0 0 8px; font-size:14px; color:var(--blue-dark); }
  .fin.pickable { cursor:pointer; transition:border-color .15s, box-shadow .15s, transform .1s; }
  .fin.pickable:hover { border-color:var(--future); }
  .fin.pickable:active { transform:scale(.98); }
  .fin.pickable.sel { border-color:var(--blue); box-shadow:0 0 0 3px rgba(10,94,168,.18); }
  .fin.pickable.sel .nm { color:var(--blue); }
  .pick-hint { color:var(--mid); font-size:13px; margin:-4px 0 4px; }
  .pick-saving { color:var(--blue); font-size:13px; font-weight:700; min-height:18px; margin-top:8px; }
  .viewbtn { background:var(--blue); color:#fff; border:none; padding:11px 20px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  .viewbtn:hover { background:var(--blue-dark); }
  .banner-ok { background:#e7f6ec; border:1px solid #bfe6cc; color:var(--green); border-radius:10px; padding:12px 16px; font-weight:700; }

  svg .raise { transition:all 1s ease; }
  footer { text-align:center; margin-top:28px; color:var(--mid); font-size:12.5px; }

  /* email gate */
  .gate { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .gate-card { background:#fff; border-radius:20px; box-shadow:0 8px 40px rgba(10,94,168,.15); padding:40px 36px; max-width:420px; width:100%; text-align:center; }
  .gate-card .inf { font-size:48px; line-height:1; margin-bottom:8px; }
  .gate-card h1 { margin:0 0 6px; color:var(--blue-dark); font-size:22px; }
  .gate-card .sub { color:var(--mid); font-size:14px; margin-bottom:28px; }
  .gate-card input[type=email] { width:100%; padding:13px 16px; border:1.5px solid #c8ddef; border-radius:10px; font-size:15px; font-family:inherit; color:var(--ink); outline:none; box-sizing:border-box; }
  .gate-card input[type=email]:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(10,94,168,.12); }
  .gate-card button { margin-top:14px; width:100%; padding:14px; background:var(--blue); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .gate-card button:hover { background:var(--blue-dark); }
  .gate-card button:disabled { opacity:.6; cursor:default; }
  .gate-error { color:#c0392b; font-size:13px; margin-top:10px; min-height:18px; }
  .gate-card .note { color:var(--mid); font-size:12px; margin-top:18px; line-height:1.5; }
</style>
</head>
<body>
<script src="https://cdn.docuseal.com/js/form.js"></script>
<div class="wrap" id="wrap">Loading your project…</div>
<script>
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => '$' + (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '';

// Animated pool cross-section. stage: 0 design,1 lotprep,2 excavation,3 forming,4 shotcrete,5 tile,6 fill/complete
function poolSvg(stage, finishColor) {
  const fc = finishColor || '#2f7fae';
  const sky = stage >= 6 ? '#bfe3f7' : '#dceaf5';
  return `
  <svg viewBox="0 0 700 300" width="100%" style="max-height:300px;display:block">
    <defs>
      <linearGradient id="waterG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#6fc3ef"/><stop offset="100%" stop-color="${fc}"/>
      </linearGradient>
      <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M20 0H0V20" fill="none" stroke="#9ec9ec" stroke-width="1"/>
      </pattern>
      <pattern id="rebar" width="26" height="26" patternUnits="userSpaceOnUse">
        <path d="M0 13H26 M13 0V26" stroke="#8a6d3b" stroke-width="2.5"/>
      </pattern>
      <clipPath id="poolClip"><path d="M150 150 L150 250 Q150 265 165 265 L535 265 Q550 265 550 250 L550 195 L420 195 L420 150 Z"/></clipPath>
    </defs>
    <rect width="700" height="300" fill="${sky}"/>
    ${stage >= 6 ? '<circle cx="630" cy="48" r="26" fill="#ffd76e"/><circle cx="630" cy="48" r="34" fill="#ffd76e" opacity=".3"/>' : ''}
    <!-- ground -->
    <rect y="140" width="700" height="160" fill="${stage === 0 ? '#eef5fb' : '#c9b18c'}"/>
    <rect y="140" width="700" height="12" fill="${stage === 0 ? '#dce9f4' : '#9fbf6e'}"/>
    ${stage === 0 ? `
      <rect y="0" width="700" height="300" fill="url(#grid)" opacity=".6"/>
      <path d="M150 150 L150 250 Q150 265 165 265 L535 265 Q550 265 550 250 L550 195 L420 195 L420 150 Z"
        fill="none" stroke="#0a5ea8" stroke-width="3" stroke-dasharray="10 7"/>
      <text x="350" y="120" text-anchor="middle" font-family="Segoe UI" font-size="20" font-weight="700" fill="#0a5ea8">YOUR POOL — DESIGN IN PROGRESS</text>
      <text x="350" y="220" text-anchor="middle" font-family="Segoe UI" font-size="13" fill="#4a87b9">finalizing finishes · engineering · permits</text>` : ''}
    ${stage === 1 ? `
      <text x="350" y="100" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="700" fill="#0a5ea8">PREPARING YOUR LOT</text>
      ${[80,180,280,380,480,580].map(x=>`<rect x="${x}" y="118" width="6" height="26" fill="#a4744a"/><rect x="${x-14}" y="122" width="34" height="4" fill="#d98c3f"/>`).join('')}
      <rect x="600" y="96" width="70" height="48" rx="6" fill="#e8a33d"/><circle cx="615" cy="150" r="10" fill="#444"/><circle cx="655" cy="150" r="10" fill="#444"/>` : ''}
    ${stage >= 2 ? `<path d="M150 150 L150 250 Q150 265 165 265 L535 265 Q550 265 550 250 L550 195 L420 195 L420 150 Z" fill="${stage >= 4 ? '#b9c4cc' : '#8a6a45'}"/>` : ''}
    ${stage === 2 ? `<text x="350" y="100" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="700" fill="#0a5ea8">EXCAVATION UNDERWAY</text>
      <path d="M560 110 l40 -26 l24 8 l-18 30 z" fill="#e8a33d"/><rect x="598" y="118" width="56" height="34" rx="6" fill="#e8a33d"/><circle cx="612" cy="158" r="11" fill="#444"/><circle cx="644" cy="158" r="11" fill="#444"/>` : ''}
    ${stage === 3 ? `<g clip-path="url(#poolClip)"><rect x="140" y="140" width="420" height="135" fill="url(#rebar)" opacity=".85"/></g>
      <text x="350" y="100" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="700" fill="#0a5ea8">FORMS, REBAR, PLUMBING & ELECTRICAL</text>
      <circle cx="200" cy="262" r="5" fill="#3a87c8"/><circle cx="500" cy="262" r="5" fill="#3a87c8"/>` : ''}
    ${stage === 4 ? `<path d="M150 150 L150 250 Q150 265 165 265 L535 265 Q550 265 550 250 L550 195 L420 195 L420 150 Z" fill="none" stroke="#7d8a94" stroke-width="14" stroke-linejoin="round"/>
      <text x="350" y="100" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="700" fill="#0a5ea8">SHOTCRETE SHELL COMPLETE — CURING</text>` : ''}
    ${stage >= 5 ? `<path d="M150 150 L150 250 Q150 265 165 265 L535 265 Q550 265 550 250 L550 195 L420 195 L420 150 Z" fill="${fc}" opacity="${stage === 5 ? 1 : .9}"/>
      <rect x="150" y="150" width="270" height="9" fill="#fff" opacity=".9"/><rect x="420" y="186" width="130" height="9" fill="#fff" opacity=".9"/>` : ''}
    ${stage === 5 ? `<text x="350" y="100" text-anchor="middle" font-family="Segoe UI" font-size="18" font-weight="700" fill="#0a5ea8">TILE, COPING & YOUR PEBBLE FINISH</text>` : ''}
    ${stage >= 6 ? `
      <g clip-path="url(#poolClip)">
        <rect class="raise" x="140" y="158" width="430" height="120" fill="url(#waterG)" opacity=".93">
          <animate attributeName="y" from="265" to="158" dur="2.2s" fill="freeze"/>
          <animate attributeName="height" from="0" to="120" dur="2.2s" fill="freeze"/>
        </rect>
        <path d="M140 163 Q170 156 200 163 T260 163 T320 163 T380 163 T440 163 T500 163 T560 163 V172 H140 Z" fill="#ffffff" opacity=".55">
          <animateTransform attributeName="transform" type="translate" values="0 0; -28 0; 0 0" dur="5s" repeatCount="indefinite"/>
        </path>
        <circle cx="240" cy="210" r="4" fill="#fff" opacity=".5"><animate attributeName="cy" values="240;170" dur="3.4s" repeatCount="indefinite"/><animate attributeName="opacity" values=".6;0" dur="3.4s" repeatCount="indefinite"/></circle>
        <circle cx="330" cy="226" r="3" fill="#fff" opacity=".5"><animate attributeName="cy" values="250;172" dur="4.2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".6;0" dur="4.2s" repeatCount="indefinite"/></circle>
        <circle cx="470" cy="216" r="4" fill="#fff" opacity=".5"><animate attributeName="cy" values="244;176" dur="3.8s" repeatCount="indefinite"/><animate attributeName="opacity" values=".6;0" dur="3.8s" repeatCount="indefinite"/></circle>
      </g>
      <text x="350" y="100" text-anchor="middle" font-family="Segoe UI" font-size="19" font-weight="800" fill="#0a5ea8">${stage > 6 ? 'YOUR POOL IS READY! 🎉' : 'FILLING & ACTIVATION — ALMOST SWIM TIME!'}</text>` : ''}
    <!-- deck line -->
    <rect x="0" y="140" width="150" height="10" fill="#e3e8ec"/><rect x="550" y="140" width="150" height="10" fill="#e3e8ec"/>
  </svg>`;
}

const ICONS = ['📐','🚧','🚜','🔩','🏗️','🎨','🏊'];

const token = location.pathname.split('/').pop();
const SESSION_KEY = 'portalSession_' + token;

// Interior-finish selection UI state (persists across re-renders):
let PORTAL_D = null;        // last portal data, so handlers can re-render
let pendingFinish = null;   // color tapped but not yet confirmed
let finishChanging = false; // true while the client is picking a replacement

function showEmailGate(errorMsg) {
  document.body.innerHTML = `
    <div class="gate">
      <div class="gate-card">
        <div class="inf">∞</div>
        <h1>Infinity Pools</h1>
        <p class="sub">Enter the email address on your project to view your portal.</p>
        <input type="email" id="gateEmail" placeholder="your@email.com" autocomplete="email">
        <button id="gateBtn" onclick="verifyEmail()">View My Project →</button>
        <div class="gate-error" id="gateErr">${errorMsg || ''}</div>
        <p class="note">🔒 Your email is only used to confirm your identity — it is never shared or used for marketing.</p>
      </div>
    </div>`;
  const inp = document.getElementById('gateEmail');
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') verifyEmail(); });
  inp.focus();
}

window.verifyEmail = async function () {
  const email = document.getElementById('gateEmail').value.trim();
  const btn = document.getElementById('gateBtn');
  const err = document.getElementById('gateErr');
  if (!email) { err.textContent = 'Please enter your email address.'; return; }
  btn.disabled = true; btn.textContent = 'Verifying…'; err.textContent = '';
  try {
    const r = await fetch('/api/portal/' + token + '/verify', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await r.json();
    if (!r.ok) { err.textContent = data.error || 'Verification failed.'; btn.disabled = false; btn.textContent = 'View My Project →'; return; }
    localStorage.setItem(SESSION_KEY, data.sessionId);
    loadPortal(data.sessionId);
  } catch (e) { err.textContent = 'Network error — please try again.'; btn.disabled = false; btn.textContent = 'View My Project →'; }
};

async function loadPortal(sessionId) {
  document.body.innerHTML = '<div class="wrap" id="wrap">Loading your project…</div>';
  let d;
  try {
    const res = await fetch('/api/portal/' + token, { headers: { 'x-portal-session': sessionId } });
    if (res.status === 401) { localStorage.removeItem(SESSION_KEY); showEmailGate(); return; }
    if (!res.ok) throw new Error();
    d = await res.json();
  } catch (e) {
    document.getElementById('wrap').innerHTML = '<div class="card"><h2>Project not found</h2><p class="muted">Please check your link or contact Infinity Pools.</p></div>';
    return;
  }
  renderPortal(d);
}

// Colors above the Standard tier carry an upgrade charge (per the Brothers Pool
// Plastering rate sheet) — marked on the portal with an asterisk.
const isUpgradeTier = tier => !!tier && tier !== 'Standard';

// Interior finish: a confirm-then-collapse selector. Before confirming, tapping a
// swatch just marks it; "Confirm Selection" saves it and collapses the list. Once
// confirmed, "Change Selection" re-opens it and a new confirmed pick alerts admin.
function finishSection(d) {
  if (!d.finishCatalog || !d.finishCatalog.length) return '';
  const sel = (d.selectedFinishes || [])[0] || null;

  // Confirmed + collapsed view.
  if (sel && !finishChanging) {
    const cat = d.finishCatalog.find(x => x.name === sel.name) || {};
    const up = isUpgradeTier(sel.tier || cat.tier);
    return `
    <div class="card">
      <h2>Your Interior Finish</h2>
      <div class="fin-grid" style="grid-template-columns:minmax(0,220px)">
        <div class="fin sel">
          ${sel.image ? `<img src="${esc(sel.image)}" alt="${esc(sel.name)}">` : `<div class="cb" style="background:${esc(sel.color || '#8fb8d4')}"></div>`}
          <div class="nm">✓ ${esc(sel.name)}${up ? ' *' : ''}<small>${esc(sel.brand || '')}</small></div>
        </div>
      </div>
      <div class="banner-ok" style="margin-top:12px">✓ Your selection is confirmed${up ? ' — this is an upgrade/premium finish, so an additional charge applies.' : '.'}</div>
      <button class="viewbtn" style="margin-top:12px" onclick="changeFinish()">Change Selection</button>
    </div>`;
  }

  // Picker view (first-time, or while changing).
  const pending = pendingFinish;
  const brands = ['PebbleTec', 'PebbleSheen', 'PebbleFina', 'PebbleBrilliance'];
  const groups = brands.map(brand => {
    const items = d.finishCatalog.filter(f => f.brand === brand);
    if (!items.length) return '';
    return `<div class="brand-group"><h3>${esc(brand)}</h3><div class="fin-grid">${items.map(f => {
      const up = isUpgradeTier(f.tier);
      const on = pending === f.name;
      return `<div class="fin pickable ${on ? 'sel' : ''}" data-finish="${esc(f.name)}" onclick="pickFinish(this.dataset.finish)">
        ${f.image ? `<img loading="lazy" src="${esc(f.image)}" alt="${esc(f.name)}">` : `<div class="cb" style="background:${esc(f.color || '#8fb8d4')}"></div>`}
        <div class="nm">${on ? '✓ ' : ''}${esc(f.name)}${up ? ' *' : ''}${f.shimmer ? ' ✨' : ''}<small>${esc(brand)}</small></div>
      </div>`;
    }).join('')}</div></div>`;
  }).join('');
  const confirmBar = mt => `
      <div style="margin:${mt} 0 0;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-approve" onclick="confirmFinish()" ${pending ? '' : 'disabled style="opacity:.5;cursor:default"'}>✓ Confirm Selection</button>
        ${finishChanging && sel ? '<button class="btn-decline" onclick="cancelChangeFinish()">Cancel</button>' : ''}
      </div>`;
  return `
    <div class="card">
      <h2>Choose Your Interior Finish</h2>
      <p class="pick-hint">Tap a Pebble Tec color to choose your pool's interior finish, then tap <b>Confirm Selection</b>.</p>
      <p class="pick-hint"><b>*</b> Colors marked with an asterisk are <b>upgrade or premium finishes</b> and carry an additional charge. Browse all colors at <a href="https://pebbletec.com/products/all-finishes/" target="_blank" rel="noopener">pebbletec.com</a>.</p>
      ${pending ? `<p class="pick-hint" style="color:var(--blue);font-weight:700">Selected: ${esc(pending)} — tap Confirm Selection to lock it in.</p>` : ''}
      ${confirmBar('4px')}
      <div class="pick-saving" id="pickSaving"></div>
      ${groups}
      ${confirmBar('14px')}
    </div>`;
}
// Switch to another of the client's projects. Their verified session works for
// any project sharing their email, so we copy it under the target's key and go.
window.switchProject = function (tok) {
  const sid = localStorage.getItem(SESSION_KEY);
  if (sid) localStorage.setItem('portalSession_' + tok, sid);
  location.href = '/portal/' + tok;
};
window.pickFinish = function (name) { pendingFinish = name; renderPortal(PORTAL_D); };
window.changeFinish = function () { finishChanging = true; pendingFinish = null; renderPortal(PORTAL_D); };
window.cancelChangeFinish = function () { finishChanging = false; pendingFinish = null; renderPortal(PORTAL_D); };
window.confirmFinish = async function () {
  const name = pendingFinish;
  if (!name) return;
  const prior = ((PORTAL_D.selectedFinishes || [])[0] || {}).name;
  const isChange = !!prior && prior !== name;
  const saving = document.getElementById('pickSaving');
  if (saving) saving.textContent = 'Saving your choice…';
  try {
    const res = await fetch('/api/portal/' + token + '/select-finish', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-portal-session': localStorage.getItem(SESSION_KEY) },
      body: JSON.stringify({ name, isChange }),
    });
    if (res.status === 401) { localStorage.removeItem(SESSION_KEY); showEmailGate(); return; }
    if (!res.ok) throw new Error();
    const d = await res.json();
    pendingFinish = null; finishChanging = false;
    renderPortal(d); window.scrollTo(0, 0);
  } catch (e) {
    const s = document.getElementById('pickSaving');
    if (s) s.textContent = 'Could not save — please try again.';
  }
};

// View the contract PDF. Fetches with the portal session header (so a plain link
// won't work) and opens the PDF as a blob in a new tab.
window.viewContract = async function () {
  const st = document.getElementById('contractStatus');
  if (st) st.textContent = 'Opening…';
  try {
    const res = await fetch('/api/portal/' + token + '/contract.pdf', {
      headers: { 'x-portal-session': localStorage.getItem(SESSION_KEY) },
    });
    if (res.status === 401) { localStorage.removeItem(SESSION_KEY); showEmailGate(); return; }
    if (!res.ok) throw new Error();
    const url = URL.createObjectURL(await res.blob());
    const w = window.open(url, '_blank');
    if (!w) { // popup blocked — fall back to a download
      const a = document.createElement('a');
      a.href = url; a.download = 'Infinity Pools Contract.pdf'; a.click();
    }
    if (st) st.textContent = '';
  } catch (e) { if (st) st.textContent = 'Could not open the contract — please try again.'; }
};

async function changeOrderAction(coId, action) {
  try {
    const res = await fetch('/api/portal/' + token + '/change-orders/' + coId + '/' + action, {
      method: 'POST', headers: { 'x-portal-session': localStorage.getItem(SESSION_KEY) },
    });
    if (res.status === 401) { localStorage.removeItem(SESSION_KEY); showEmailGate(); return; }
    if (!res.ok) throw new Error();
    const y = window.scrollY;
    renderPortal(await res.json());
    window.scrollTo(0, y);
  } catch (e) { alert('Something went wrong — please try again.'); }
}
window.coApprove = function (coId) {
  if (!confirm('Approve this change order? This authorizes the additional work; for a charge, we\'ll send your invoice and payment request.')) return;
  changeOrderAction(coId, 'approve');
};
window.coDecline = function (coId) {
  if (!confirm('Decline this change order? We\'ll follow up with you.')) return;
  changeOrderAction(coId, 'decline');
};

function renderPortal(d) {
  PORTAL_D = d;
  const phases = d.phases;
  const curIdx = phases.findIndex(p => p.status === 'active');
  const doneAll = phases.every(p => p.status === 'complete');
  const stage = doneAll ? 7 : Math.max(curIdx, 0);
  const cur = curIdx >= 0 ? phases[curIdx] : null;
  const finishColor = (d.selectedFinishes.find(f => f.color) || {}).color;
  // Files we've shared are session-gated; <img>/<a> pass the session as ?s=…
  const sid = localStorage.getItem(SESSION_KEY);
  const fileUrl = id => `/api/portal/${token}/files/${id}?s=${encodeURIComponent(sid)}`;
  const renderings = (d.renderings || []).filter(f => f.isImage);
  const sharedFiles = d.sharedFiles || [];

  const stepCls = (p, i) => p.status === 'complete' ? 'past' : (p.status === 'active' ? 'current' : 'future');

  // ---- Left column: Build Tracker + Interior Finish ----
  const trackerHtml = `
    <div class="card">
      <h2>Build Tracker</h2>
      <div class="tracker">
        ${phases.map((p, i) => `<div class="step ${stepCls(p, i)}"><div class="bar"></div><div class="dot">${p.status === 'complete' ? '✓' : i + 1}</div><div class="lbl">${esc(p.clientLabel)}</div></div>`).join('')}
      </div>
      <div style="margin-top:18px">${poolSvg(stage, finishColor)}</div>
      ${cur ? `
        <div style="margin-top:16px">
          <div style="font-weight:800;color:var(--blue);font-size:17px">Now: ${esc(cur.name)} ${cur.dueDate ? '<span class="muted" style="font-weight:600">· target ' + fmtDate(cur.dueDate) + '</span>' : ''}</div>
          <p style="margin:6px 0 0">${esc(cur.clientSummary)}</p>
        </div>
        ${cur.amountDue > 0 ? `
          <div class="due-banner">
            <div>
              <div class="muted">Deposit due for this phase (${cur.drawPct}% draw)</div>
              <div class="amt">${money(cur.amountDue)}</div>
              ${d.feeNotes.length ? `<div class="muted">${d.feeNotes.map(esc).join(' · ')} · no fee for checks</div>` : ''}
            </div>
            ${cur.paymentReceivedAt
              ? '<div class="paid">✓ Paid — thank you!</div>'
              : cur.paymentLink
                ? `<a class="paybtn" href="${esc(cur.paymentLink)}" target="_blank" rel="noopener">Pay securely with QuickBooks →</a>`
                : '<div class="muted">Your secure QuickBooks payment link is on its way by email.</div>'}
          </div>
          ${!cur.paymentReceivedAt ? `<p class="muted" style="margin-top:10px">🔒 Payments are processed by Intuit QuickBooks on their secure site. Infinity Pools never sees your card or bank details, and you'll receive an emailed receipt instantly.</p>` : ''}` : ''}` : ''}
    </div>`;

  // ---- Right column: Contract, Change Orders, Phases, Files ----
  const contractHtml = (d.contractViewable || d.signing) ? `
    <div class="card" id="contractCard">
      <h2>📄 Your Contract</h2>
      ${d.contractSigned
        ? `<div class="banner-ok">✓ Signed${d.contractSignedAt ? ' on ' + fmtDate(d.contractSignedAt) : ''} — thank you!</div>`
        : d.signing
          ? `<p class="muted">Please review your contract below and sign securely. Once you sign, your project moves into the Design phase and we'll get started.</p>`
          : `<p class="muted">Your contract is ready to review. We'll let you know when it's ready to sign.</p>`}
      <div style="margin:10px 0">
        <button class="viewbtn" onclick="viewContract()">📄 View My Contract (PDF)</button>
        <span class="pick-saving" id="contractStatus" style="margin-left:10px"></span>
      </div>
      ${d.signing && d.signing.provider === 'docuseal' ? `
        <div class="pick-saving" id="signStatus"></div>
        <docuseal-form id="docusealForm" data-src="${esc(d.signing.src)}" data-expand="false"></docuseal-form>` : ''}
    </div>` : '';

  const changeOrdersHtml = (d.changeOrders && d.changeOrders.length) ? `
    <div class="card">
      <h2>🧾 Change Orders</h2>
      <p class="muted" style="margin:-6px 0 4px">Additional work or credits for your project. Please review and approve so we can proceed.</p>
      ${d.changeOrders.map(co => {
        const pending = co.status === 'pending';
        const credit = co.value < 0;
        return `<div class="co ${pending ? 'pending' : ''}">
          <div class="top">
            <div class="desc">${esc(co.description)}</div>
            <div class="amt">${credit ? '−' : ''}${money(Math.abs(co.value))}${credit ? ' credit' : ''}</div>
          </div>
          ${pending ? `
            <div class="actions">
              <button class="btn-approve" onclick="coApprove('${co.id}')">✓ Approve${co.value > 0 ? ' & Get Invoice' : ''}</button>
              <button class="btn-decline" onclick="coDecline('${co.id}')">Decline</button>
            </div>` : `
            <div style="margin-top:8px">
              <span class="status-ok">✓ Approved${co.approvedAt ? ' on ' + fmtDate(co.approvedAt) : ''}</span>
              ${co.value > 0 ? (co.paymentReceivedAt ? ' · <span class="paid">✓ Paid — thank you!</span>' : co.paymentLink ? ` · <a class="paybtn" style="padding:8px 18px;font-size:13px" href="${esc(co.paymentLink)}" target="_blank" rel="noopener">Pay ${money(co.value)} →</a>` : ' · <span class="muted">Your invoice is on its way by email.</span>') : ''}
            </div>`}
        </div>`;
      }).join('')}
    </div>` : '';

  const phasesHtml = `
    <div class="card">
      <h2>All Phases</h2>
      <div class="phase-list">
        ${phases.map((p, i) => `
          <div class="phase-item ${stepCls(p, i)}">
            <div class="ico">${p.status === 'complete' ? '✅' : ICONS[i] || '🔹'}</div>
            <div>
              <div class="nm">${esc(p.name)} <span class="muted" style="font-weight:500">· ${esc(p.time)}${p.completedAt ? ' · completed ' + fmtDate(p.completedAt) : p.status === 'active' && p.dueDate ? ' · target ' + fmtDate(p.dueDate) : ''}</span></div>
              <div class="desc">${esc(p.clientSummary)}</div>
              ${p.drawPct > 0 ? `<div class="muted" style="margin-top:3px">${p.drawPct}% draw — ${money(p.amountDue)}${p.paymentReceivedAt ? ' · ✓ paid' : ''}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>`;

  const renderingsHtml = (d.contractSigned && renderings.length) ? `
    <div class="card">
      <h2>🎨 Your Pool Renderings</h2>
      <p class="muted" style="margin:-6px 0 12px">Tap any rendering to view it full size.</p>
      <div class="rend-grid">
        ${renderings.map(f => `<div class="rend"><a href="${fileUrl(f.id)}" target="_blank" rel="noopener"><img loading="lazy" src="${fileUrl(f.id)}" alt="${esc(f.name)}"></a></div>`).join('')}
      </div>
    </div>` : '';

  const filesHtml = (d.contractSigned && sharedFiles.length) ? `
    <div class="card">
      <details class="files">
        <summary>📁 Project Files (${sharedFiles.length})</summary>
        <ul class="filelist">
          ${sharedFiles.map(f => `<li><span>${f.isImage ? '🖼️' : '📄'}</span><a href="${fileUrl(f.id)}" target="_blank" rel="noopener">${esc(f.name)}</a><span class="cat">${esc(f.category)}</span></li>`).join('')}
        </ul>
      </details>
    </div>` : '';

  $('#wrap').innerHTML = `
    ${(d.otherProjects && d.otherProjects.length > 1) ? `
    <div class="proj-switch">
      <span class="lbl">Your projects:</span>
      ${d.otherProjects.map(p => p.current
        ? `<span class="proj cur">${esc(p.address)}</span>`
        : `<button class="proj" onclick="switchProject('${p.token}')">${esc(p.address)}</button>`).join('')}
    </div>` : ''}
    <header>
      <div class="brand"><span class="inf">∞</span>INFINITY POOLS</div>
      <h1>${esc(d.address)}</h1>
      <div class="sub">${esc(d.name)} — ${doneAll ? 'your pool build is complete! 🎉' : cur ? 'currently in the ' + esc(cur.name) + ' phase' : 'getting ready to start'}</div>
    </header>

    ${d.clientTodos.length ? `<div class="todo"><b>⚠️ Action needed from you:</b><ul>${d.clientTodos.map(t => '<li>' + esc(t.text) + '</li>').join('')}</ul></div>` : ''}

    <div class="cols">
      <div class="col">
        ${trackerHtml}
        ${finishSection(d)}
      </div>
      <div class="col">
        ${contractHtml}
        ${changeOrdersHtml}
        ${phasesHtml}
        ${renderingsHtml}
        ${filesHtml}
      </div>
    </div>

    <footer>Infinity Pools · Questions? Just reply to any of our emails — we're happy to help.</footer>`;

  // When the client finishes signing in the embedded DocuSeal form, confirm with
  // the server (so it works even without a public webhook) and refresh the portal.
  const form = document.getElementById('docusealForm');
  if (form) {
    form.addEventListener('completed', async () => {
      const st = document.getElementById('signStatus');
      if (st) st.textContent = '✓ Thank you! Finalizing your contract…';
      try {
        const res = await fetch('/api/portal/' + token + '/contract/signed', {
          method: 'POST', headers: { 'x-portal-session': localStorage.getItem(SESSION_KEY) },
        });
        if (res.ok) { const d2 = await res.json(); renderPortal(d2); window.scrollTo(0, 0); }
      } catch (e) { /* webhook will finalize server-side */ }
    });
  }
}

// Entry point — check for existing session, otherwise show email gate
(function init() {
  const sessionId = localStorage.getItem(SESSION_KEY);
  if (sessionId) { loadPortal(sessionId); } else { showEmailGate(); }
})();
</script>
</body>
</html>
